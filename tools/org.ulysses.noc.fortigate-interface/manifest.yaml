canonical_id: org.ulysses.noc.fortigate-interface/1.0.0
name: FortiGate Interface
version: 1.0.0
description: |
  CRUD operations for interfaces on FortiGate devices.

  Supports:
  - Create interfaces (loopback, VLAN, aggregate, redundant)
  - Update interface settings (IP, allowaccess, alias, status)
  - Delete interfaces (loopback, VLAN, aggregate only)
  - List all interfaces with optional type filter
  - Get specific interface details

  Use this tool for consistent, repeatable interface management
  instead of ad-hoc CLI commands or config-push.

metadata:
  org_namespace: ulysses
  domain: noc
  intent: provision
  vendor: fortinet
  shelf: noc/fortigate
  tags:
    - fortigate
    - interface
    - crud
    - loopback
    - vlan
    - network

runtime:
  language: python
  entry_point: main
  source_file: org.ulysses.noc.fortigate-interface.py
  python_packages:
    - pyyaml>=6.0
    - requests>=2.28.0
  files:
    - config/fortigate_credentials.yaml

parameters:
  type: object
  required:
    - target_ip
    - action
  properties:
    target_ip:
      type: string
      format: ipv4
      description: FortiGate management IP address
    action:
      type: string
      enum: [add, update, remove, list, get]
      description: CRUD action to perform
    name:
      type: string
      description: Interface name (required for add/update/remove/get)
    type:
      type: string
      enum: [loopback, vlan, aggregate, redundant, tunnel]
      description: Interface type (required for add, optional filter for list)
    ip:
      type: string
      description: "IP address with mask (e.g., '172.16.0.1/32' or '172.16.0.1 255.255.255.255')"
    allowaccess:
      type: string
      description: "Space-separated access methods (ping https ssh http fgfm)"
    alias:
      type: string
      description: Interface alias/description
    vlanid:
      type: integer
      description: VLAN ID (required for VLAN type)
    interface:
      type: string
      description: Parent interface (required for VLAN type)
    status:
      type: string
      enum: [up, down]
      description: Interface admin status
    role:
      type: string
      enum: [lan, wan, dmz, undefined]
      description: Interface role
    verify_ssl:
      type: boolean
      default: false
      description: Verify SSL certificate

output_schema:
  type: object
  properties:
    success:
      type: boolean
    action:
      type: string
    target_ip:
      type: string
    name:
      type: string
    type:
      type: string
    message:
      type: string
    interface:
      type: object
    interfaces:
      type: array
    count:
      type: integer

credentials:
  - ref: local://config/fortigate_credentials.yaml
    type: config_file
    required: true

capabilities:
  network:
    outbound:
      - https:443
  filesystem:
    read:
      - config/*.yaml
  max_execution_time_ms: 30000

status: certified
skills_ref: Skills.md
security:
  certified: true
  certified_at: '2026-01-21T18:30:00.000000+00:00'
  certified_by: trust-anchor
  algorithm: RSA-2048-PKCS1v15-SHA256
  verified_via: trust-anchor-lookup
