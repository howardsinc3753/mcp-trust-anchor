canonical_id: org.ulysses.cloud.forticloud-product-list/1.0.1
name: FortiCloud Product List
version: 1.0.1
description: 'List registered products/assets from FortiCloud Asset Management.

  Returns products with their entitlements, support coverage, and folder location.

  Supports filtering by serial number, expiration date, status, and product model.


  API Base: https://support.fortinet.com/ES/api/registration/v3/

  Client ID: assetmanagement

  '
metadata:
  org_namespace: ulysses
  domain: cloud
  intent: monitor
  vendor: fortinet
  shelf: cloud/forticloud
  tags:
  - forticloud
  - asset-management
  - product
  - inventory
  - entitlement
  - support
  - mssp
runtime:
  language: python
  entry_point: main
  source_file: org.ulysses.cloud.forticloud-product-list.py
  python_packages:
  - requests>=2.28.0
  - pyyaml>=6.0
  dotnet_packages: []
  files:
  - config/forticloud_credentials.yaml
  services: []
parameters:
  type: object
  required: []
  properties:
    serial_number:
      type: string
      description: Serial number or pattern (e.g., "FGT*" for all FortiGates)
    expire_before:
      type: string
      description: ISO 8601 date - find products expiring before this date
    status:
      type: string
      enum:
      - Registered
      - Pending
      description: Filter by registration status
    product_model:
      type: string
      description: Filter by product model (e.g., "FortiGate 90D")
    account_id:
      type: integer
      description: Account ID (required for Org scope API users, auto-loaded from
        config)
    api_username:
      type: string
      description: FortiCloud API username (overrides credential file)
    api_password:
      type: string
      description: FortiCloud API password (overrides credential file)
output_schema:
  type: object
  properties:
    success:
      type: boolean
      description: Whether the query succeeded
    product_count:
      type: integer
      description: Number of products returned
    products:
      type: array
      description: List of products
      items:
        type: object
        properties:
          serial_number:
            type: string
            description: Product serial number
          product_model:
            type: string
            description: Product model name
          status:
            type: string
            description: Registration status
          description:
            type: string
            description: Product description
          folder_id:
            type: integer
            description: Asset folder ID
          folder_path:
            type: string
            description: Asset folder path
          account_id:
            type: integer
            description: Account ID
          registration_date:
            type: string
            description: Registration date
          is_decommissioned:
            type: boolean
            description: Whether product is decommissioned
          entitlements:
            type: array
            description: Support entitlements
    error:
      type: string
      description: Error message if success is false
credentials:
- ref: vault://forticloud/assetmanagement
  type: api_credentials
  required: false
  scope:
  - read
  description: FortiCloud Asset Management API credentials
- ref: local://config/forticloud_credentials.yaml
  type: config_file
  required: false
  description: Local credential file
capabilities:
  network:
    outbound:
    - https://customerapiauth.fortinet.com:443
    - https://support.fortinet.com:443
    inbound: []
  filesystem:
    read:
    - config/*.yaml
    write: []
  process:
    spawn: false
    elevated: false
  max_execution_time_ms: 60000
telemetry:
  metrics_enabled: true
  log_level: INFO
  trace_enabled: false
versioning:
  breaking_change: false
  supersedes: org.ulysses.cloud.forticloud-product-list/1.0.0
security:
  checksum_sha256: null
  signature: null
  cert_chain: null
  certified: true
  certified_at: '2026-01-20T03:40:55.099966+00:00'
  certified_by: trust-anchor
  algorithm: RSA-2048-PKCS1v15-SHA256
  verified_via: trust-anchor-lookup
status: certified
skills_ref: Skills.md
