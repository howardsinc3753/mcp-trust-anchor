canonical_id: org.ulysses.cloud.fortiztp-script-create/1.0.10
name: FortiZTP Script Create
version: 1.0.10
description: |
  Create pre-run CLI scripts for Zero Touch Provisioning.

  Creates bootstrap scripts containing FortiGate CLI commands that execute
  during initial device setup. Use this for automated site configuration.

  For full content support, provide account_email parameter or add it to
  the credential file under local_iam.fortiztp.account_email. This enables
  the v1 API which supports content upload.

  IMPORTANT: FortiZTP does NOT support ORG IAM API Users. Only Local type works.

  API Base: https://fortiztp.forticloud.com/public/api/v2
  Client ID: fortiztp

metadata:
  org_namespace: ulysses
  domain: cloud
  intent: provision
  vendor: fortinet
  shelf: cloud/fortiztp
  tags:
    - fortiztp
    - zero-touch-provisioning
    - script
    - bootstrap
    - cli
    - configuration
    - create

runtime:
  language: python
  entry_point: main
  source_file: org.ulysses.cloud.fortiztp-script-create.py
  python_packages:
    - requests>=2.28.0
    - pyyaml>=6.0
  dotnet_packages: []
  files:
    - config/forticloud_credentials.yaml
  services: []

parameters:
  type: object
  required:
    - name
    - content
  properties:
    name:
      type: string
      description: Script name (e.g., "Site-A-Bootstrap")
    content:
      type: string
      description: FortiGate CLI commands to execute during provisioning
    account_email:
      type: string
      description: FortiCloud account email (enables v1 API with full content support)
    api_username:
      type: string
      description: FortiCloud API username (overrides credential file)
    api_password:
      type: string
      description: FortiCloud API password (overrides credential file)

output_schema:
  type: object
  properties:
    success:
      type: boolean
      description: Whether the creation succeeded
    message:
      type: string
      description: Success message
    script:
      type: object
      properties:
        oid:
          type: integer
          description: Script OID (use for provisioning)
        name:
          type: string
          description: Script name
        content_length:
          type: integer
          description: Length of script content
    error:
      type: string
      description: Error message if success is false

credentials:
  - ref: vault://forticloud/fortiztp
    type: api_credentials
    required: false
    scope:
      - write
    description: FortiCloud ZTP API credentials (Local IAM user only)
  - ref: local://config/forticloud_credentials.yaml
    type: config_file
    required: false
    description: Local credential file

capabilities:
  network:
    outbound:
      - https://customerapiauth.fortinet.com:443
      - https://fortiztp.forticloud.com:443
    inbound: []
  filesystem:
    read:
      - config/*.yaml
    write: []
  process:
    spawn: false
    elevated: false
  max_execution_time_ms: 60000

telemetry:
  metrics_enabled: true
  log_level: INFO
  trace_enabled: false

versioning:
  breaking_change: false
  supersedes: null

security:
  checksum_sha256: null
  signature: null
  cert_chain: null

status: draft
skills_ref: Skills.md
