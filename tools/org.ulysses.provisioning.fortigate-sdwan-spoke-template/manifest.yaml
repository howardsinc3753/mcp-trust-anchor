canonical_id: org.ulysses.provisioning.fortigate-sdwan-spoke-template/1.3.0
name: FortiGate SD-WAN Spoke Template
version: 1.3.0
description: |
  Complete SD-WAN spoke provisioning with dual VPN tunnels and ADVPN.

  v1.3.0 Changes (2026-01-24):
  - ADVPN ZONE: Now configures advpn-select=enable, advpn-health-check on zone
  - SD-WAN NEIGHBOR: Creates neighbor entry for BGP integration
  - Steps 8-9 added for complete ADVPN configuration
  - Matches spoke-02 baseline configuration exactly

  v1.2.0 Changes (2026-01-24):
  - NAMING: Standardized to match BASELINE_TEMPLATE.yaml naming_constants
    - Tunnels: HUB1-VPN1, HUB1-VPN2 (hyphens, not underscores)
    - Loopback: Spoke-Lo (hyphen, not underscore)
    - Zone: SDWAN_OVERLAY (underscore)
  - ADVPN: Added auto-discovery-sender, auto-discovery-receiver, tunnel-search
  - CRITICAL: transport explicitly set to "udp" (never "auto")
  - CRITICAL: net-device set to "enable" (required for SD-WAN)

  v1.1.1 Changes (2026-01-22):
  - BUGFIX: set_system_global now ALWAYS called (was conditional on hostname/management_ip)
  - admintimeout, rest-api-key-url-query now always set regardless of other params

  Creates:
  - System global/settings configuration (ike-tcp-port: 11443)
  - Loopback interface for BGP/health peering
  - TWO IPsec tunnels with ADVPN settings
  - SD-WAN zone with ADVPN settings (advpn-select, advpn-health-check)
  - SD-WAN neighbor for BGP route integration
  - SD-WAN health check monitoring both tunnels
  - BGP bootstrap static routes to hub loopbacks
  - Firewall address objects and policies
metadata:
  org_namespace: ulysses
  domain: noc
  intent: configure
  vendor: fortinet
  shelf: provisioning/fortigate
  tags:
  - fortigate
  - sdwan
  - ipsec
  - provisioning
  - spoke
  - overlay
runtime:
  language: python
  entry_point: main
  source_file: org.ulysses.provisioning.fortigate-sdwan-spoke-template.py
  python_packages:
  - pyyaml>=6.0
  dotnet_packages: []
  files:
  - config/fortigate_credentials.yaml
  services: []
parameters:
  type: object
  required:
  - target_ip
  - hub_wan_ip
  - loopback_ip
  - psk
  properties:
    target_ip:
      type: string
      description: Spoke FortiGate management IP
      format: ipv4
    hub_wan_ip:
      type: string
      description: Hub's public WAN IP (IPsec remote gateway)
      format: ipv4
    loopback_ip:
      type: string
      description: Spoke loopback IP with mask (e.g., "172.16.0.1 255.255.255.255")
    psk:
      type: string
      description: Pre-shared key for IPsec tunnel
      sensitive: true
    # System Global Settings (NEW v1.1.0)
    site_id:
      type: integer
      description: |
        Site ID for hostname derivation (e.g., 4 -> "sdwan-spoke-04").
        If not provided, hostname must be specified explicitly.
    hostname:
      type: string
      description: Device hostname (or derived from site_id)
    management_ip:
      type: string
      format: ipv4
      description: Management IP for system global (defaults to target_ip)
    timezone:
      type: string
      default: US/Pacific
      description: Device timezone
    admintimeout:
      type: integer
      default: 480
      description: Admin session timeout in minutes
    # System Settings (NEW v1.1.0)
    ike_tcp_port:
      type: integer
      default: 11443
      description: |
        IKE TCP port to avoid conflict with HTTPS on 443.
        CRITICAL: Without this, IKE over TCP can lock out GUI access.
    # Interface and Tunnel Settings
    loopback_name:
      type: string
      default: Spoke-Lo
      description: Loopback interface name (from BASELINE_TEMPLATE naming_constants)
    tunnel_name:
      type: string
      default: HUB1-VPN1
      description: Primary IPsec tunnel name - network-id 1 (from BASELINE_TEMPLATE)
    create_second_vpn:
      type: boolean
      default: true
      description: Create second VPN tunnel for SD-WAN redundancy
    tunnel_name_2:
      type: string
      default: HUB1-VPN2
      description: Secondary IPsec tunnel name - network-id 2 (from BASELINE_TEMPLATE)
    wan_interface:
      type: string
      description: WAN interface for tunnel binding (auto-detected if not specified)
    sdwan_zone:
      type: string
      default: SDWAN_OVERLAY
      description: SD-WAN zone name (from BASELINE_TEMPLATE naming_constants)
    hub_loopback_ip:
      type: string
      default: 172.16.255.253
      description: Hub loopback IP for health check target
    hub_bgp_loopbacks:
      type: array
      items:
        type: string
        format: ipv4
      default:
        - 172.16.255.252
        - 172.16.255.253
      description: |
        Hub BGP loopback IPs for bootstrap static routes.
        CRITICAL: Without these routes, BGP cannot establish because spoke
        has no path to hub BGP peers until BGP learns them (chicken-and-egg).
        Routes are created via the IPsec tunnel interface.
    network_id:
      type: integer
      default: 1
      description: Network overlay ID (1-255)
output_schema:
  type: object
  properties:
    success:
      type: boolean
    target_ip:
      type: string
    components_created:
      type: array
      items:
        type: string
    errors:
      type: array
      items:
        type: string
    config_summary:
      type: object
    message:
      type: string
    error:
      type: string
credentials:
- ref: local://config/fortigate_credentials.yaml
  type: config_file
  required: true
  scope:
  - read
capabilities:
  network:
    outbound:
    - https:443
    inbound: []
  filesystem:
    read:
    - config/*.yaml
    write: []
  process:
    spawn: false
    elevated: false
  max_execution_time_ms: 120000
status: certified
skills_ref: Skills.md
security:
  certified: true
  certified_at: '2026-01-24T16:59:36.909175Z'
  certified_by: trust-anchor
  algorithm: RSA-2048-PKCS1v15-SHA256
  verified_via: trust-anchor-lookup
