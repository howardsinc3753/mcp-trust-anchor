canonical_id: org.ulysses.cloud.fortibot-chat/1.0.0
name: FortiBot.ai Chat
version: 1.0.0
description: 'Send chat messages to FortiBot.ai and receive AI-powered responses.

  Supports multiple models including Claude, DeepSeek, and GLM.

  OpenAI-compatible chat completions API.

  '
metadata:
  org_namespace: ulysses
  domain: cloud
  intent: execute
  vendor: fortibot
  shelf: cloud/fortibot
  tags:
  - fortibot
  - chat
  - ai
  - llm
  - fortinet
  - cybersecurity
runtime:
  language: python
  entry_point: main
  source_file: org.ulysses.cloud.fortibot-chat.py
  python_packages:
  - requests>=2.28.0
  dotnet_packages: []
  files: []
  services: []
parameters:
  type: object
  required:
  - messages
  properties:
    messages:
      type: array
      description: Array of message objects with role and content
      items:
        type: object
        properties:
          role:
            type: string
            enum:
            - system
            - user
            - assistant
          content:
            type: string
    model:
      type: string
      default: deepseek
      description: Model to use (claude-haiku, claude-sonnet, claude-opus, deepseek,
        glm)
    api_key:
      type: string
      description: FortiBot.ai API key (optional if using credentials)
    base_url:
      type: string
      default: http://fortibot.ai:3000
      description: FortiBot.ai API base URL
output_schema:
  type: object
  properties:
    success:
      type: boolean
      description: Whether the chat request succeeded
    id:
      type: string
      description: Chat completion ID
    model:
      type: string
      description: Model used for completion
    provider:
      type: string
      description: Provider backend (claude, deepseek, glm)
    message:
      type: object
      description: Assistant response message
      properties:
        role:
          type: string
        content:
          type: string
    usage:
      type: object
      description: Token usage statistics
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
        tokens_burned:
          type: integer
        credit_balance:
          type: integer
    error:
      type: string
      description: Error message if success is false
credentials:
- ref: vault://fortibot/api_key
  type: api_key
  required: false
  scope:
  - chat
  description: FortiBot.ai API key
capabilities:
  network:
    outbound:
    - http:3000
    - https:443
    inbound: []
  filesystem:
    read: []
    write: []
  process:
    spawn: false
    elevated: false
  max_execution_time_ms: 120000
telemetry:
  metrics_enabled: true
  log_level: INFO
  trace_enabled: false
versioning:
  breaking_change: false
  supersedes: null
status: certified
skills_ref: Skills.md
security:
  certified: true
  certified_at: '2026-02-03T21:41:15.995316+00:00'
  certified_by: trust-anchor
  algorithm: RSA-2048-PKCS1v15-SHA256
  verified_via: trust-anchor-lookup
