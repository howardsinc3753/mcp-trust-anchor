canonical_id: org.ulysses.noc.fortigate-bgp-neighbor-range/1.0.0
name: FortiGate BGP Neighbor Range
version: 1.0.0
description: 'Manage BGP neighbor ranges on FortiGate devices.


  Neighbor ranges allow dynamic BGP peer acceptance from specified

  IP prefixes, essential for SD-WAN hub deployments accepting

  dynamic spoke connections.


  Supports:

  - List all neighbor ranges

  - Get specific neighbor range

  - Create neighbor range with prefix and group

  - Update neighbor range parameters

  - Delete neighbor range


  API endpoint: /api/v2/cmdb/router/bgp/neighbor-range

  '
metadata:
  org_namespace: ulysses
  domain: noc
  intent: provision
  vendor: fortinet
  shelf: noc/fortigate
  tags:
  - fortigate
  - bgp
  - neighbor-range
  - sdwan
  - dynamic-peers
runtime:
  language: python
  entry_point: main
  source_file: org.ulysses.noc.fortigate-bgp-neighbor-range.py
  python_packages:
  - pyyaml>=6.0
  - requests>=2.28.0
  files:
  - config/fortigate_credentials.yaml
parameters:
  type: object
  required:
  - target_ip
  properties:
    target_ip:
      type: string
      format: ipv4
      description: FortiGate management IP address
    action:
      type: string
      enum:
      - list
      - get
      - add
      - update
      - remove
      default: list
      description: CRUD action to perform
    id:
      type: integer
      description: Neighbor range ID (required for get/update/remove)
    prefix:
      type: string
      description: IP prefix to accept neighbors from (e.g., 10.10.0.0/16)
    neighbor_group:
      type: string
      description: Neighbor group name to apply to accepted peers
    max_neighbor_num:
      type: integer
      description: Maximum number of neighbors to accept (0 = unlimited)
    verify_ssl:
      type: boolean
      default: false
      description: Verify SSL certificate
output_schema:
  type: object
  properties:
    success:
      type: boolean
    action:
      type: string
    target_ip:
      type: string
    neighbor_ranges:
      type: array
    neighbor_range:
      type: object
    message:
      type: string
    error:
      type: string
credentials:
- ref: local://config/fortigate_credentials.yaml
  type: config_file
  required: true
capabilities:
  network:
    outbound:
    - https:443
  filesystem:
    read:
    - config/*.yaml
  max_execution_time_ms: 30000
status: certified
skills_ref: Skills.md
security:
  certified: true
  certified_at: '2026-01-21T15:07:43.142363+00:00'
  certified_by: trust-anchor
  algorithm: RSA-2048-PKCS1v15-SHA256
