canonical_id: org.ulysses.noc.fortigate-static-route/1.0.0
name: FortiGate Static Route
version: 1.0.0
description: 'Manage static routes on FortiGate devices.

  Supports list, get, add, update, remove operations.

  Essential for SD-WAN overlay routing and health check routes.

  '
metadata:
  org_namespace: ulysses
  domain: noc
  intent: provision
  vendor: fortinet
  shelf: noc/fortigate
  tags:
  - fortigate
  - routing
  - static-route
  - sdwan
runtime:
  language: python
  entry_point: main
  source_file: org.ulysses.noc.fortigate-static-route.py
  python_packages:
  - pyyaml>=6.0
  - requests>=2.28.0
  files:
  - config/fortigate_credentials.yaml
parameters:
  type: object
  required:
  - target_ip
  properties:
    target_ip:
      type: string
      format: ipv4
      description: FortiGate management IP address
    action:
      type: string
      enum:
      - list
      - get
      - add
      - update
      - remove
      default: list
      description: CRUD action to perform
    seq_num:
      type: integer
      description: Route sequence number
    dst:
      type: string
      description: Destination subnet (e.g., 10.0.0.0/8)
    gateway:
      type: string
      description: Next-hop gateway IP
    device:
      type: string
      description: Outbound interface name
    distance:
      type: integer
      default: 10
      description: Administrative distance
    weight:
      type: integer
      description: ECMP weight
    priority:
      type: integer
      description: Route priority
    comment:
      type: string
      description: Route description
    blackhole:
      type: string
      enum:
      - enable
      - disable
      description: Create blackhole route
    status:
      type: string
      enum:
      - enable
      - disable
      description: Enable or disable route
    verify_ssl:
      type: boolean
      default: false
      description: Verify SSL certificate
output_schema:
  type: object
  properties:
    success:
      type: boolean
    action:
      type: string
    routes:
      type: array
    route:
      type: object
    seq_num:
      type: integer
    message:
      type: string
    error:
      type: string
credentials:
- ref: local://config/fortigate_credentials.yaml
  type: config_file
  required: true
capabilities:
  network:
    outbound:
    - https:443
  filesystem:
    read:
    - config/*.yaml
  max_execution_time_ms: 30000
status: certified
skills_ref: Skills.md
security:
  certified: true
  certified_at: '2026-01-20T21:12:45.614420+00:00'
  certified_by: trust-anchor
  algorithm: RSA-2048-PKCS1v15-SHA256
  verified_via: trust-anchor-lookup
