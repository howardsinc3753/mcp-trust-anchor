# FortiGate Health Check Tool
# Demonstrates a real-world network monitoring tool

canonical_id: "org.example.fortigate-health-check/1.0.0"
name: "FortiGate Health Check"
version: "1.0.0"
description: |
  Check FortiGate device health metrics including CPU, memory,
  session count, uptime, and firmware version.

metadata:
  domain: "noc"
  vendor: "fortinet"
  author: "MCP Trust Anchor Team"
  intent: "troubleshoot"
  tags:
    - fortigate
    - health
    - network
    - firewall
    - monitoring

runtime:
  language: "python"
  min_version: "3.10"
  entry_point: "main"
  source_file: "fortigate_health_check.py"
  python_packages:
    - pyyaml>=6.0

parameters:
  - name: "target_ip"
    type: "string"
    required: true
    description: "FortiGate management IP address"
    format: "ipv4"
  - name: "timeout"
    type: "integer"
    required: false
    default: 30
    description: "Request timeout in seconds"
  - name: "verify_ssl"
    type: "boolean"
    required: false
    default: false
    description: "Verify SSL certificate"

credentials:
  - ref: "local://config/fortigate_credentials.yaml"
    type: "config_file"
    required: false
    description: "Local credential file with FortiGate API keys"

capabilities:
  network_access: true
  file_access: true
  requires_credentials: true

output_schema:
  type: "object"
  properties:
    success:
      type: "boolean"
      description: "Whether the health check succeeded"
    target_ip:
      type: "string"
      description: "Target FortiGate IP address"
    hostname:
      type: "string"
      description: "Device hostname"
    serial_number:
      type: "string"
      description: "Device serial number"
    firmware_version:
      type: "string"
      description: "FortiOS firmware version"
    cpu_percent:
      type: "number"
      description: "Current CPU utilization percentage"
    memory_percent:
      type: "number"
      description: "Current memory utilization percentage"
    session_count:
      type: "integer"
      description: "Current active session count"
    error:
      type: "string"
      description: "Error message if success is false"

skills_ref: "Skills.md"
