canonical_id: org.ulysses.noc.fortigate-sdwan-member/1.0.3
name: FortiGate SD-WAN Member
version: 1.0.3
description: 'CRUD operations for SD-WAN members on FortiGate devices.


  Configure SD-WAN member interfaces with:

  - Interface and zone assignment

  - Source IP (loopback for overlay)

  - Priority values (priority-in-sla, priority-out-sla)

  - Cost settings


  Use on Spoke devices to configure overlay member priorities.

  '
metadata:
  org_namespace: ulysses
  domain: noc
  intent: configure
  vendor: fortinet
  shelf: noc/fortigate
  tags:
  - fortigate
  - sdwan
  - member
  - priority
  - overlay
runtime:
  language: python
  entry_point: main
  source_file: org.ulysses.noc.fortigate-sdwan-member.py
  python_packages:
  - pyyaml>=6.0
  files:
  - config/fortigate_credentials.yaml
parameters:
  type: object
  required:
  - target_ip
  - action
  properties:
    target_ip:
      type: string
      description: FortiGate management IP
      format: ipv4
    action:
      type: string
      enum:
      - add
      - update
      - remove
      - list
      - get
      description: Operation to perform
    seq_num:
      type: integer
      description: Member sequence number (required for add/update/remove/get)
    interface:
      type: string
      description: Interface name (required for add)
    zone:
      type: string
      description: SD-WAN zone name
    source:
      type: string
      description: Source IP address (loopback IP for overlay)
    priority_in_sla:
      type: integer
      description: Priority when SLA is met (lower = preferred)
    priority_out_sla:
      type: integer
      description: Priority when SLA is not met
    cost:
      type: integer
      description: Interface cost
    gateway:
      type: string
      description: Gateway IP (for underlay members)
    verify_ssl:
      type: boolean
      default: false
output_schema:
  type: object
  properties:
    success:
      type: boolean
    action:
      type: string
    members:
      type: array
    message:
      type: string
credentials:
- ref: local://config/fortigate_credentials.yaml
  type: config_file
  required: true
capabilities:
  network:
    outbound:
    - https:443
  filesystem:
    read:
    - config/*.yaml
  max_execution_time_ms: 60000
status: certified
skills_ref: Skills.md
security:
  certified: true
  certified_at: '2026-01-20T22:29:58.798223+00:00'
  certified_by: trust-anchor
  algorithm: RSA-2048-PKCS1v15-SHA256
  verified_via: trust-anchor-lookup
