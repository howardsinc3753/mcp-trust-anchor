canonical_id: org.ulysses.cloud.fortiztp-script-list/1.0.5
name: FortiZTP Script List
version: 1.0.5
description: |
  List all pre-run CLI scripts available for Zero Touch Provisioning.

  Scripts contain FortiGate CLI commands that run during initial device setup.
  Use this to find script OIDs for device provisioning.

  IMPORTANT: FortiZTP does NOT support ORG IAM API Users. Only Local type works.

  API Base: https://fortiztp.forticloud.com/public/api/v2
  Client ID: fortiztp

metadata:
  org_namespace: ulysses
  domain: cloud
  intent: provision
  vendor: fortinet
  shelf: cloud/fortiztp
  tags:
    - fortiztp
    - zero-touch-provisioning
    - script
    - bootstrap
    - cli
    - configuration

runtime:
  language: python
  entry_point: main
  source_file: org.ulysses.cloud.fortiztp-script-list.py
  python_packages:
    - requests>=2.28.0
    - pyyaml>=6.0
  dotnet_packages: []
  files:
    - config/forticloud_credentials.yaml
  services: []

parameters:
  type: object
  required: []
  properties:
    include_content:
      type: boolean
      description: If true, fetch script content for each script (slower)
      default: false
    api_username:
      type: string
      description: FortiCloud API username (overrides credential file)
    api_password:
      type: string
      description: FortiCloud API password (overrides credential file)

output_schema:
  type: object
  properties:
    success:
      type: boolean
      description: Whether the query succeeded
    script_count:
      type: integer
      description: Number of scripts returned
    scripts:
      type: array
      description: List of scripts
      items:
        type: object
        properties:
          oid:
            type: integer
            description: Script OID (use for provisioning)
          name:
            type: string
            description: Script name
          update_time:
            type: string
            description: Last update timestamp
          content:
            type: string
            description: Script content (CLI commands) - only if include_content=true
    error:
      type: string
      description: Error message if success is false

credentials:
  - ref: vault://forticloud/fortiztp
    type: api_credentials
    required: false
    scope:
      - read
    description: FortiCloud ZTP API credentials (Local IAM user only)
  - ref: local://config/forticloud_credentials.yaml
    type: config_file
    required: false
    description: Local credential file

capabilities:
  network:
    outbound:
      - https://customerapiauth.fortinet.com:443
      - https://fortiztp.forticloud.com:443
    inbound: []
  filesystem:
    read:
      - config/*.yaml
    write: []
  process:
    spawn: false
    elevated: false
  max_execution_time_ms: 60000

telemetry:
  metrics_enabled: true
  log_level: INFO
  trace_enabled: false

versioning:
  breaking_change: false
  supersedes: null

security:
  checksum_sha256: null
  signature: null
  cert_chain: null

status: draft
skills_ref: Skills.md
