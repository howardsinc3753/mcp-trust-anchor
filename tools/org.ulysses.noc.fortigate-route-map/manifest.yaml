canonical_id: org.ulysses.noc.fortigate-route-map/1.0.0
name: FortiGate Route Map
version: 1.0.0
description: 'Manage route-maps on FortiGate devices.


  Route-maps are used for BGP policy control including:

  - Filtering routes during redistribution

  - Modifying route attributes (local-pref, MED, AS-path)

  - Controlling route advertisement to neighbors


  Supports:

  - List all route-maps

  - Get specific route-map with rules

  - Create route-map with match/set clauses

  - Update route-map rules

  - Delete route-map


  API endpoint: /api/v2/cmdb/router/route-map

  '
metadata:
  org_namespace: ulysses
  domain: noc
  intent: provision
  vendor: fortinet
  shelf: noc/fortigate
  tags:
  - fortigate
  - route-map
  - bgp
  - policy
  - routing
runtime:
  language: python
  entry_point: main
  source_file: org.ulysses.noc.fortigate-route-map.py
  python_packages:
  - pyyaml>=6.0
  - requests>=2.28.0
  files:
  - config/fortigate_credentials.yaml
parameters:
  type: object
  required:
  - target_ip
  properties:
    target_ip:
      type: string
      format: ipv4
      description: FortiGate management IP address
    action:
      type: string
      enum:
      - list
      - get
      - add
      - update
      - remove
      default: list
      description: CRUD action to perform
    name:
      type: string
      description: Route-map name (required for get/add/update/remove)
    comments:
      type: string
      description: Description/comments for the route-map
    rule:
      type: object
      description: Rule to add/update (for add/update actions)
      properties:
        id:
          type: integer
          description: Rule sequence number
        action:
          type: string
          enum:
          - permit
          - deny
          description: Permit or deny matching routes
        match_ip_address:
          type: string
          description: Match prefix-list name
        match_ip_nexthop:
          type: string
          description: Match next-hop prefix-list
        match_as_path:
          type: string
          description: Match AS-path list name
        match_community:
          type: string
          description: Match community list name
        match_tag:
          type: integer
          description: Match route tag value
        set_local_preference:
          type: integer
          description: Set local preference value
        set_metric:
          type: integer
          description: Set metric/MED value
        set_aspath:
          type: string
          description: Prepend AS path
        set_community:
          type: string
          description: Set community string
        set_tag:
          type: integer
          description: Set route tag
    verify_ssl:
      type: boolean
      default: false
      description: Verify SSL certificate
output_schema:
  type: object
  properties:
    success:
      type: boolean
    action:
      type: string
    target_ip:
      type: string
    route_maps:
      type: array
    route_map:
      type: object
    message:
      type: string
    error:
      type: string
credentials:
- ref: local://config/fortigate_credentials.yaml
  type: config_file
  required: true
capabilities:
  network:
    outbound:
    - https:443
  filesystem:
    read:
    - config/*.yaml
  max_execution_time_ms: 30000
status: certified
skills_ref: Skills.md
security:
  certified: true
  certified_at: '2026-01-21T15:07:43.407880+00:00'
  certified_by: trust-anchor
  algorithm: RSA-2048-PKCS1v15-SHA256
  verified_via: trust-anchor-lookup
